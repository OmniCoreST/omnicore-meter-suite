# =============================================================================
# KATEGORİ E: FF BIT 56 — AYNI AY İÇİNDE BİRDEN FAZLA RESET
# =============================================================================

[[rules]]
code = "FF-057"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 56
session_type = "short_read"
severity = "warning"
description = "Sayaç aynı ay içerisinde birden fazla reset aldı"
# TEDAŞ Ek-F Bit 56: "Sayaç aynı ay içerisinde birden fazla ya da birbirini takip eden iki ay
# içerisinde bu aylardan her birinde bir defa reset aldı ise"
# MASS Ek-C Bit 56: REZERVE — MASS bu biti kullanmıyor.
# Bu kural yalnızca TEDAŞ uyumluluğu için geçerlidir.
spec_ref = "TEDAŞ Şartname Ek-F Bit 56 (MASS Şartname Ek-C'de Rezerve)"
cause = "Sayaç bu ay içinde birden fazla kez resetlenmiş. Elektrik kesintisi veya kasıtlı müdahale olabilir."
remedy = "Reset nedenini araştırın. Şüpheli durumda tutanak düzenleyin ve kesinti kayıtlarını inceleyin."
profile = ["single_phase", "three_phase_direct", "three_phase_ct"]
enabled = true


