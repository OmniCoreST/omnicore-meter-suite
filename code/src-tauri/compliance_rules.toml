cause = "L1 (R faz) anlık akım değeri tek fazlı sayaç maksimum akım sınırının (80A) dışında."
remedy = "Bağlantıyı ve yükü kontrol edin. Akım sınırı aşıldıysa CT'li bağlantıya geçilmesini değerlendirin."
enabled = true

