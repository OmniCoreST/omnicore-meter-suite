# compliance_rules.toml
# =====================
# TEDAŞ MLZ/2017-062.B ve MASS Protokol Uyumluluk Kuralları
# Versiyon: 2.0.0
#
# Bu dosyayı düzenleyerek uyumluluk kurallarını güncelleyebilirsiniz.
# Programlama bilgisi gerekmez — mevcut bir [[rules]] bloğunu kopyalayıp değiştirin.
#
# Desteklenen kural tipleri (check değerleri):
#   range              → Sayısal aralık (min, max)
#   equals             → Eşitlik (value)
#   not_equals         → Eşit olmamalı (value)
#   not_empty          → Boş olmamalı
#   bit_zero           → ff_code/gf_code'da bit 0 olmalı (bit)
#   bit_one            → Bit 1 olmalı (bit)
#   tariff_balance     → T1+T2+T3+T4 = toplam (tolerance, kWh)
#   time_drift_minutes → Sayaç/sistem saat farkı (max_drift, dakika)
#
# phases: 1 veya 3 — yalnızca o faz sayısındaki sayaçlara uygulanır.
#         Belirtilmezse tüm sayaçlarda çalışır.
#
# severity: "error" | "warning" | "info"
# update_url: GitHub raw URL — boş bırakılırsa otomatik güncelleme devre dışı

rules_version = "2.0.0"
update_url = ""

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# KİMLİK KURALLARI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "ID-001"
field = "serial_number"
check = "not_empty"
severity = "error"
description = "Seri numarası boş — sayaç kimliği okunamıyor"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"
cause = "Sayaç hafızasında seri numarası kaydı bulunmuyor veya 0.0.0 OBIS kodu yanıt vermiyor."
remedy = "Sayacı servise gönderin. Fabrika ayarlarında seri numarası programlanmalıdır."

[[rules]]
code = "ID-002"
field = "production_date"
check = "not_empty"
severity = "warning"
description = "Üretim tarihi boş"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"
cause = "Sayaç üretim tarihi parametresi programlanmamış veya OBIS 0.1.0 kaydı yok."
remedy = "Sayacı üretici servisiyle iletişime geçerek üretim tarihi parametresini programlatın."

[[rules]]
code = "ID-003"
field = "calibration_date"
check = "not_empty"
severity = "warning"
description = "Kalibrasyon tarihi boş"
spec_ref = "TEDAŞ Şartname 2.1.11 madde 47 / MASS Şartname 2.1.11"
cause = "Sayaç kalibrasyon tarihi hiç girilmemiş veya periyodik kalibrasyon yapılmamış."
remedy = "Akredite bir laboratuvarda kalibrasyon yaptırın ve tarihi sayaca programlatın."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ELEKTRİKSEL PARAMETRELER
# TEDAS Şartname 2.2.2 Çizelge 4, MASS Şartname 2.2.2 — Calisma gerilimi: 90–265 V
# TEDAS Şartname 1.4 Çizelge 2, MASS Şartname 1.4 — Frekans: 50 Hz ±%2
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "EL-001"
field = "voltage_l1"
check = "range"
min = 90.0
max = 265.0
severity = "error"
description = "L1 (R faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "Şebeke gerilimi normal sınırlar dışında. Düşük gerilim: trafo sorunu veya aşırı yük. Yüksek gerilim: reaktif güç dengesizliği veya trafo hatası olabilir."
remedy = "Dağıtım şirketi ile iletişime geçin. Trafo çıkış gerilimini ve bağlantı noktası gerilimini kontrol edin."

[[rules]]
code = "EL-002"
field = "voltage_l2"
check = "range"
min = 90.0
max = 265.0
phases = 3
severity = "error"
description = "L2 (S faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "S fazı gerilimi anormal. Faz kopukluğu, kötü bağlantı veya şebeke dengesizliği olabilir."
remedy = "Faz bağlantılarını ve sigorta durumunu kontrol edin. Dağıtım şirketini bilgilendirin."

[[rules]]
code = "EL-003"
field = "voltage_l3"
check = "range"
min = 90.0
max = 265.0
phases = 3
severity = "error"
description = "L3 (T faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "T fazı gerilimi anormal. Faz kopukluğu, kötü bağlantı veya şebeke dengesizliği olabilir."
remedy = "Faz bağlantılarını ve sigorta durumunu kontrol edin. Dağıtım şirketini bilgilendirin."

[[rules]]
code = "EL-004"
field = "frequency"
check = "range"
min = 49.0
max = 51.0
severity = "warning"
description = "Şebeke frekansı tolerans dışında — beklenen: 50 Hz ±%2 (49–51 Hz)"
spec_ref = "TEDAŞ Şartname 1.4 Çizelge 2 / MASS Şartname 1.4"
cause = "Şebeke frekansı, Türkiye elektrik şebekesi için belirlenen 50 Hz ±%2 tolerans bandının dışında."
remedy = "Bu durum genellikle anlık şebeke yüküne bağlıdır ve kullanıcı müdahalesini gerektirmez. Sürekli ise TEİAŞ'a bildirin."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PIL VE ROLE DURUMU
# TEDAS Şartname 4.11, MASS Şartname 4.11
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "BAT-001"
field = "battery_status"
check = "not_equals"
value = "low"
severity = "warning"
description = "Pil seviyesi düşük — sayaç belleğini kaybedebilir"
spec_ref = "TEDAŞ Şartname 4.11 / MASS Şartname 4.11"
cause = "Yedek pil ömrünü tamamlamak üzere. Güç kesintisinde sayaç saati ve belleği korunamayabilir."
remedy = "En kısa sürede yetkili servis aracılığıyla pili değiştirin. Sayacı kapalı tutmayın."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEMANT PERIYODU
# TEDAS Şartname 4.3 madde 91, MASS Şartname 4.3 madde 80 — Standart: 15 dakika
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "DEM-001"
field = "demand_period"
check = "equals"
value = "15"
severity = "warning"
description = "Talep ölçüm periyodu 15 dakika olmalı (TEDAŞ standart değeri)"
spec_ref = "TEDAŞ Şartname 4.3 madde 91 / MASS Şartname 4.3 madde 80"
cause = "Sayaç talep ölçüm periyodu TEDAŞ standardı olan 15 dakika yerine farklı bir değere programlanmış."
remedy = "Sayacın talep periyodu parametresini 15 dakika olarak programlayın (Periyotlar sayfasından yapılabilir)."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TARiFE DENGESi
# TEDAS Şartname 4.2, MASS Şartname 4.2 — T0 = T1+T2+T3+T4
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "TRF-001"
field = "tariff_sum"
check = "tariff_balance"
tolerance = 0.01
severity = "warning"
description = "T1+T2+T3+T4 toplamı genel toplama eşit değil (tolerans: 0,01 kWh)"
spec_ref = "TEDAŞ Şartname 4.2 / MASS Şartname 4.2"
cause = "Tarife register'larının toplamı toplam enerji değeriyle örtüşmüyor. Sayaç yazılım hatası veya bozuk hafıza kaydı olabilir."
remedy = "Sayacı servise gönderin. Register tutarsızlığı fabrika sıfırlaması gerektirebilir."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SAAT SAPMASI
# TEDAS Şartname 2.1.11 madde 47, MASS Şartname 2.1.11 — Maks sapma: 0.5 sn/gun (TS EN 62054-21)
# 5 dakikalik uygulama esigi kullanilmistir
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "TIME-001"
field = "time_drift"
check = "time_drift_minutes"
max_drift = 5
severity = "warning"
description = "Sayaç saati sistem saatinden 5 dakikadan fazla sapıyor — zaman senkronizasyonu önerilir"
spec_ref = "TEDAŞ Şartname 2.1.11 madde 47 / TS EN 62054-21"
cause = "Sayaç iç saati (RTC) ile bilgisayar saati arasında 5 dakikadan fazla fark var. Uzun süredir senkronize edilmemiş veya RTC pili zayıflamış olabilir."
remedy = "Zaman Senkronizasyonu sayfasından saat düzeltmesi yapın. Sorun tekrarlarsa pil değişimi gerekebilir."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# FF HATA / DURUM KODU (F.F.0)
# TEDAS Şartname 5.3 ve Ek-F, MASS Şartname 5.3 ve Ek-C
# Her bit icin ayri bir kural — bit_zero: ilgili bit 1 olmamali
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Donanim Hatalari (Bit 0–4) ──────────────────────────────────────────────

[[rules]]
code = "FF-001"
field = "ff_code"
check = "bit_zero"
bit = 0
severity = "error"
description = "Gerçek zamanlı saat modülü (RTC) arızası (FF Bit 0)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayaç içindeki RTC entegresi arızalı veya RTC pili tamamen bitmiş."
remedy = "Sayacı yetkili servise gönderin. RTC modülü veya pil değişimi gereklidir."

[[rules]]
code = "FF-002"
field = "ff_code"
check = "bit_zero"
bit = 1
severity = "error"
description = "Ölçüm entegresi arızası — enerji ölçümü güvenilir değil (FF Bit 1)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Enerji ölçüm entegresi (metroloji çipi) arızalı. Bu durumda sayacın ölçüm değerlerine güvenilemez."
remedy = "Sayacı derhal devre dışı bırakın ve yetkili servis aracılığıyla değiştirin."

[[rules]]
code = "FF-003"
field = "ff_code"
check = "bit_zero"
bit = 2
severity = "error"
description = "Kritik ölçüm hatası tespit edildi (FF Bit 2)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayaç kendi öz-testinde kritik bir donanım hatası tespit etti."
remedy = "Sayacı yetkili servis aracılığıyla değiştirin. Ölçüm değerleri geçersiz sayılmalıdır."

[[rules]]
code = "FF-004"
field = "ff_code"
check = "bit_zero"
bit = 3
severity = "warning"
description = "RS-485 iletişim portu hatası (FF Bit 3)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayacın RS-485 haberleşme portu hata durumunda. Kablo sorunu veya port donanımı arızalı olabilir."
remedy = "RS-485 kablo bağlantılarını kontrol edin. Sorun devam ederse yetkili servis çağırın."

[[rules]]
code = "FF-005"
field = "ff_code"
check = "bit_zero"
bit = 4
severity = "error"
description = "Sayaç kalibre edilmemiş (FF Bit 4)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayaç fabrikadan kalibrasyon yapılmadan çıkmış ya da kalibrasyon verileri silinmiş."
remedy = "Akredite bir kalibrasyon laboratuvarında kalibrasyon yaptırın. Sayaç bu halde kullanılamaz."

# ── Fiziksel Mudahale (Bit 5–7) ─────────────────────────────────────────────

[[rules]]
code = "FF-006"
field = "ff_code"
check = "bit_zero"
bit = 5
severity = "warning"
description = "Klemens kapağı açık veya açılma geçmişi mevcut (FF Bit 5)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Klemens bölmesi kapağı açılmış ya da şu anda açık. Yetkisiz müdahale veya bakım kaydı olabilir."
remedy = "Kapak kapalıysa geçmiş müdahale tutanağını inceleyin. Açıksa derhal kapatıp mühürleyin ve tutanak tutun."

[[rules]]
code = "FF-007"
field = "ff_code"
check = "bit_zero"
bit = 6
severity = "warning"
description = "Üst kapak açık veya açılma geçmişi mevcut (FF Bit 6)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayacın üst kapağı açılmış ya da şu anda açık. Yetkisiz müdahale şüphesi."
remedy = "Kapak kapalıysa geçmiş açılma kaydını inceleyin. Gerekirse tutanak tutarak dağıtım şirketini bilgilendirin."

[[rules]]
code = "FF-008"
field = "ff_code"
check = "bit_zero"
bit = 7
severity = "info"
description = "Geçmişte üst kapak açılmış (FF Bit 7)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "Sayaç hafızasında geçmişte üst kapak açılma olayı kaydedilmiş."
remedy = "Geçmiş uyarılar sayfasından kapak açılma kaydını inceleyin. Yetkisiz açılma şüphesi varsa dağıtım şirketini bilgilendirin."

# ── Akım Var / Gerilim Yok (Bit 8–10) ──────────────────────────────────────

[[rules]]
code = "FF-009"
field = "ff_code"
check = "bit_zero"
bit = 8
severity = "error"
description = "R fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 8)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "R fazında gerilim ölçülmüyor ancak akım akmaya devam ediyor. Sayaç gerilim bağlantısının devre dışı bırakıldığına dair bir müdahale şüphesi taşıyor."
remedy = "Acilen dağıtım şirketine bildirin. Sayaç bağlantılarını yetkili teknisyen incelemelidir."

[[rules]]
code = "FF-010"
field = "ff_code"
check = "bit_zero"
bit = 9
phases = 3
severity = "error"
description = "S fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 9)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "S fazında gerilim ölçülmüyor ancak akım akmaya devam ediyor. Müdahale şüphesi."
remedy = "Acilen dağıtım şirketine bildirin. Sayaç bağlantılarını yetkili teknisyen incelemelidir."

[[rules]]
code = "FF-011"
field = "ff_code"
check = "bit_zero"
bit = 10
phases = 3
severity = "error"
description = "T fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 10)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"
cause = "T fazında gerilim ölçülmüyor ancak akım akmaya devam ediyor. Müdahale şüphesi."
remedy = "Acilen dağıtım şirketine bildirin. Sayaç bağlantılarını yetkili teknisyen incelemelidir."

# ── Manyetik Alan (Bit 11–13) ───────────────────────────────────────────────
# TEDAS Şartname 4.10 madde 141, MASS Şartname 4.10 madde 128 — Esik: >400 mT

[[rules]]
code = "FF-012"
field = "ff_code"
check = "bit_zero"
bit = 11
severity = "error"
description = "R fazında manyetik alan müdahalesi tespit edildi (>400 mT) (FF Bit 11)"
spec_ref = "TEDAŞ Şartname 4.10 madde 141 / MASS Şartname 4.10 madde 128"
cause = "Sayaç ölçüm devresini etkileyecek güçte bir manyetik alan (>400 mT) tespit edildi. Harici güçlü mıknatıs ile müdahale şüphesi."
remedy = "Acilen dağıtım şirketine bildirin. Sayaç çevresini inceleyin. Manyetik müdahale enerji hırsızlığı kapsamında değerlendirilebilir."

[[rules]]
code = "FF-013"
field = "ff_code"
check = "bit_zero"
bit = 12
phases = 3
severity = "error"
description = "S fazında manyetik alan müdahalesi tespit edildi (>400 mT) (FF Bit 12)"
spec_ref = "TEDAŞ Şartname 4.10 madde 141 / MASS Şartname 4.10 madde 128"
