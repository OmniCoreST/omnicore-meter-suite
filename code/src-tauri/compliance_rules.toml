# =============================================================================
# OmniCore Meter Suite - Compliance Configuration v3.0.0
# =============================================================================
#
# Bu dosya sayaç uyumluluk denetiminin tüm ayarlarını içerir:
#   - Sayaç profilleri (tek faz, üç faz, akım trafolu vb.)
#   - Denetim test planı (hangi okuma modları çalıştırılacak)
#   - Uyumluluk kuralları (OBIS varlık, format, değer, protokol vb.)
#
# Dosya formatı: TOML (https://toml.io)
# Kodlama: UTF-8
#
# Kural kategorileri:
#   obis_existence    - Zorunlu OBIS kodlarının varlığı
#   obis_format       - OBIS değerlerinin format kontrolü
#   obis_value        - OBIS değerlerinin sayısal/mantıksal kontrolü
#   cross_value       - Birden fazla OBIS değeri arası kontrol
#   protocol          - IEC 62056-21 protokol uyumluluğu
#   session           - Okuma/yazma oturumlarının başarısı
#   load_profile      - Yük profili yapısal kontrolleri
#   full_read         - Tam okuma veri yapısı kontrolleri
#
# =============================================================================

config_version = "3.0.0"
update_url = ""

# =============================================================================
# SAYAÇ PROFİLLERİ
# =============================================================================
#
# Her profil bir sayaç tipini tanımlar. Kurallar "profile" alanı ile
# hangi profillere uygulanacağını belirler.
#
# Bir kural "profile" belirtmezse TÜM profillerde çalışır.
# Bir kural profile = ["three_phase_direct", "three_phase_ct"] derse
# sadece o profillerde çalışır.

[[profiles]]
id = "single_phase"
name = "Tek Fazlı Sayaç"
phases = 1
connection = "direct"           # direct | ct
description = "Tek fazlı direkt bağlantı sayacı (monofaze)"

[[profiles]]
id = "three_phase_direct"
name = "Üç Fazlı Direkt Bağlantı"
phases = 3
connection = "direct"
description = "Üç fazlı direkt bağlantı sayacı (trifaze)"

[[profiles]]
id = "three_phase_ct"
name = "Üç Fazlı Akım Trafolu"
phases = 3
connection = "ct"
description = "Üç fazlı akım trafosu bağlantılı sayaç"


# =============================================================================
# TEST PLANI
# =============================================================================
#
# Uyumluluk denetimi sırasında hangi işlemlerin yapılacağını belirler.
# Her test_plan bir sayaç profili grubuna uygulanabilir.
# enabled = false yaparak bir adımı devre dışı bırakabilirsiniz.
#
# Desteklenen adımlar:
#   short_read    - Kısa okuma (Mode 6)
#   full_read     - Tam okuma (Mode 0)
#   load_profile  - Yük profili okuma (Mode 1 + P.01)
#   packet_read   - Paket okuma (Mode 7/8/9) — packet_mode ile belirtilir
#   obis_read     - Belirli OBIS kodlarını tekil okuma (Mode 1 + R1)
#
# TEDAŞ Okuma Modları:
#   Mode 0  - Uzun Okuma Modu (Tüm Bilgiler)
#   Mode 1  - Programlama Modu
#   Mode 6  - Kısa Okuma Paketi
#   Mode 7  - Geçmiş Bilgiler Paketi
#   Mode 8  - Uyarı Paketi
#   Mode 9  - Kesinti Kayıtları Paketi (Son 10 Kesinti Bilgileri)
#
# Adımlar yukarıdan aşağıya sırayla çalıştırılır.
# Bir adım başarısız olursa sonraki adımlar yine çalışır (bağımsız).

[test_plan]
name = "TEDAŞ Tam Uyumluluk Testi"
description = "TEDAŞ şartnamesi kapsamında tüm okuma modlarını test eder"

[[test_plan.steps]]
id = "short_read"
name = "Kısa Okuma (Mode 6)"
mode = "short_read"
enabled = true
timeout_seconds = 30
retry_count = 1

[[test_plan.steps]]
id = "full_read"
name = "Tam Okuma (Mode 0)"
mode = "full_read"
enabled = true
timeout_seconds = 120
retry_count = 1

[[test_plan.steps]]
id = "load_profile"
name = "Yük Profili Okuma"
mode = "load_profile"
enabled = true
timeout_seconds = 180
retry_count = 1

[[test_plan.steps]]
id = "history_packet"
name = "Geçmiş Bilgiler Paketi (Mode 7)"
mode = "packet_read"
packet_mode = 7
enabled = true
timeout_seconds = 60
retry_count = 1

[[test_plan.steps]]
id = "warning_packet"
name = "Uyarı Paketi (Mode 8)"
mode = "packet_read"
packet_mode = 8
enabled = true
timeout_seconds = 60
retry_count = 1

[[test_plan.steps]]
id = "outage_packet"
name = "Kesinti Kayıtları Paketi (Mode 9)"
mode = "packet_read"
packet_mode = 9
enabled = true
timeout_seconds = 60
retry_count = 1

[[test_plan.steps]]
id = "time_check"
name = "Saat Kontrolü"
mode = "obis_read"
obis_codes = ["0.9.1", "0.9.2"]
enabled = true
timeout_seconds = 30
retry_count = 1


# =============================================================================
# KURALLAR
# =============================================================================
#
# --- Ortak alanlar (tüm kural kategorileri için) ---
#
#   code          Benzersiz kural kodu (örn. "OBIS-001")
#   category      Kural kategorisi (aşağıdaki listeden)
#   check         Kontrol tipi (kategoriye göre değişir)
#   severity      "error" | "warning" | "info"
#   description   Uyumsuzluk açıklaması
#   spec_ref      Şartname referansı (isteğe bağlı)
#   cause         Sorunun olası nedeni (isteğe bağlı)
#   remedy        Önerilen düzeltme (isteğe bağlı)
#   profile       Hangi profillerde çalışır (isteğe bağlı, belirtilmezse hepsinde)
#   session_type  Hangi okuma tipinde çalışır (isteğe bağlı):
#                   "short_read" | "full_read" | "load_profile" | "any"
#                 Belirtilmezse "any" kabul edilir.
#   enabled       true | false (varsayılan: true)
#


# =============================================================================
# KATEGORİ 1: OBIS VARLIK KONTROLLERİ (obis_existence)
# =============================================================================
#
# Sayacın belirli OBIS kodlarını döndürüp döndürmediği kontrol edilir.
# Kısa okumada bazı OBIS kodları gelmeyebilir, bu yüzden session_type önemli.
#
# Özel alanlar:
#   obis_codes    Kontrol edilecek OBIS kod listesi (hepsi mevcut olmalı)

[[rules]]
code = "OBIS-001"
category = "obis_existence"
check = "must_exist"
session_type = "short_read"
obis_codes = [
    "0.0.0",                               # Seri numarası
    "0.9.1", "0.9.2",                      # Saat ve tarih
    "32.7.0", "31.7.0",                    # Anlık gerilim ve akım (L1)
    "14.7.0",                              # Frekans
    "1.8.0", "1.8.1", "1.8.2", "1.8.3",   # Aktif enerji (T0-T3)
    "F.F.0",                               # FF hata kodu
]
severity = "error"
description = "Kısa okumada zorunlu OBIS kodları eksik"
spec_ref = "TEDAŞ Şartname Ek-C Kısa Okuma Paketi (6) / MASS Şartname Ek-C"
cause = "Sayaç firmware'i kısa okuma paketinde zorunlu OBIS kodlarını döndürmüyor."
remedy = "Sayaç firmware güncellemesi gerekebilir. Üretici ile iletişime geçin."

[[rules]]
code = "OBIS-002"
category = "obis_existence"
check = "must_exist"
session_type = "full_read"
obis_codes = [
    # Kimlik
    "0.0.0", "0.9.1", "0.9.2", "0.2.0", "0.2.1",
    "96.1.3",
    # Anlık ölçümler
    "32.7.0", "31.7.0", "91.7.0", "33.7.0", "14.7.0",
    "15.7.0", "131.7.0",
    # Enerji endeksleri
    "1.8.0", "1.8.1", "1.8.2", "1.8.3", "1.8.4",
    "2.8.0", "2.8.1", "2.8.2", "2.8.3", "2.8.4",
    "5.8.0", "6.8.0", "7.8.0", "8.8.0",
    # Demant
    "1.6.0", "2.6.0",
    # Durum kodları
    "F.F.0", "F.F.1", "F.A.0",
    # Yapılandırma
    "0.8.0", "96.3.10", "96.3.12", "96.3.13",
    # Yük profili kanal tanımları
    "97.1.0", "97.2.0",
    # Kesinti kayıtları (en az ilk giriş)
    "96.2.2",
]
severity = "error"
description = "Tam okumada zorunlu OBIS kodları eksik"
spec_ref = "TEDAŞ Şartname Ek-C / MASS Şartname Ek-C"
cause = "Sayaç tam okumada TEDAŞ/MASS şartnamesinin gerektirdiği tüm OBIS kodlarını döndürmüyor."
remedy = "Sayaç firmware'inin TEDAŞ Ek-C'deki zorunlu OBIS kod listesini desteklediğinden emin olun. Firmware güncellemesi veya üretici desteği gerekebilir."

[[rules]]
code = "OBIS-003"
category = "obis_existence"
check = "must_exist"
session_type = "full_read"
profile = ["three_phase_direct", "three_phase_ct"]
obis_codes = [
    "52.7.0", "72.7.0",                   # L2, L3 gerilim
    "51.7.0", "71.7.0",                    # L2, L3 akım
    "53.7.0", "73.7.0",                    # L2, L3 güç faktörü
]
severity = "error"
description = "Üç fazlı sayaçlarda L2/L3 OBIS kodları zorunlu"
spec_ref = "TEDAŞ Şartname Ek-C / MASS Şartname Ek-C"
cause = "Üç fazlı sayaç olarak seçilmiş ancak L2/L3 faz verileri tam okumada bulunmuyor."
remedy = "Sayaç profil seçimini kontrol edin. Eğer sayaç gerçekten üç fazlıysa firmware güncellemesi gerekebilir."


# =============================================================================
# KATEGORİ 2: OBIS FORMAT KONTROLLERİ (obis_format)
# =============================================================================
#
# OBIS değerlerinin beklenen formatta olup olmadığını kontrol eder.
# Regex deseni kullanılır.
#
# Özel alanlar:
#   obis_code     Kontrol edilecek tek OBIS kodu
#   pattern       Beklenen regex deseni (değer kısmına uygulanır)

[[rules]]
code = "FMT-001"
category = "obis_format"
check = "value_format"
obis_code = "1.8.0"
pattern = '^\d{6}\.\d{3}\*kWh$'
severity = "warning"
description = "Aktif enerji değeri XXXXXX.XXX*kWh formatında olmalı"
spec_ref = "TEDAŞ Şartname 4.2"
cause = "Sayaç aktif enerji değerini standart dışı formatta döndürüyor."
remedy = "Sayaç üreticisine başvurun. Enerji endeks formatı TEDAŞ şartnamesine uygun olmalıdır."

[[rules]]
code = "FMT-002"
category = "obis_format"
check = "value_format"
obis_code = "F.F.0"
pattern = '^[01]{64}$'
severity = "error"
description = "FF hata kodu 64 bitlik binary string olmalı"
spec_ref = "TEDAŞ Şartname 5.3"
cause = "F.F.0 hata/durum kodu 64 bitlik ikili (binary) formatta değil."
remedy = "Sayaç firmware'i F.F.0 kodunu 64 bit binary string olarak döndürmelidir. Üretici ile iletişime geçin."

[[rules]]
code = "FMT-003"
category = "obis_format"
check = "value_format"
obis_code = "0.9.2"
pattern = '^\d{2}-\d{2}-\d{2}$'
severity = "warning"
description = "Tarih YY-MM-DD formatında olmalı"
spec_ref = "IEC 62056-21 Annex A"
cause = "Sayaç tarih bilgisini standart YY-MM-DD formatında döndürmüyor."
remedy = "Sayaç tarih formatı ayarını kontrol edin. IEC 62056-21 standardına uygun olmalıdır."

[[rules]]
code = "FMT-004"
category = "obis_format"
check = "value_format"
obis_code = "0.9.1"
pattern = '^\d{2}:\d{2}:\d{2}$'
severity = "warning"
description = "Saat HH:MM:SS formatında olmalı"
spec_ref = "IEC 62056-21 Annex A"
cause = "Sayaç saat bilgisini standart HH:MM:SS formatında döndürmüyor."
remedy = "Sayaç saat formatı ayarını kontrol edin. IEC 62056-21 standardına uygun olmalıdır."

[[rules]]
code = "FMT-005"
category = "obis_format"
check = "value_format"
obis_code = "32.7.0"
pattern = '^\d+\.\d+\*V$'
severity = "warning"
description = "Gerilim değeri XXX.XX*V formatında olmalı"
spec_ref = "TEDAŞ Şartname Ek-A"
cause = "Gerilim ölçüm değeri beklenen birim formatında (V) döndürülmüyor."
remedy = "Sayaç üreticisine başvurun. Gerilim değeri sayısal*V formatında olmalıdır."

[[rules]]
code = "FMT-006"
category = "obis_format"
check = "value_format"
obis_code = "31.7.0"
pattern = '^\d+\.\d+\*A$'
severity = "warning"
description = "Akım değeri XXX.XXX*A formatında olmalı"
spec_ref = "TEDAŞ Şartname Ek-A"
cause = "Akım ölçüm değeri beklenen birim formatında (A) döndürülmüyor."
remedy = "Sayaç üreticisine başvurun. Akım değeri sayısal*A formatında olmalıdır."

[[rules]]
code = "FMT-007"
category = "obis_format"
check = "value_format"
obis_code = "14.7.0"
pattern = '^\d+\.\d+\*Hz$'
severity = "warning"
description = "Frekans değeri XX.X*Hz formatında olmalı"
spec_ref = "TEDAŞ Şartname Ek-A"
cause = "Frekans ölçüm değeri beklenen birim formatında (Hz) döndürülmüyor."
remedy = "Sayaç üreticisine başvurun. Frekans değeri sayısal*Hz formatında olmalıdır."

[[rules]]
code = "FMT-008"
category = "obis_format"
check = "value_format"
obis_code = "1.6.0"
pattern = '^\d{3}\.\d{3}\*kW$'
severity = "warning"
description = "Maksimum demant değeri XXX.XXX*kW formatında olmalı"
spec_ref = "TEDAŞ Şartname 4.3"
cause = "Maksimum demant değeri beklenen birim formatında (kW) döndürülmüyor."
remedy = "Sayaç üreticisine başvurun. Demant değeri XXX.XXX*kW formatında olmalıdır."


# =============================================================================
# KATEGORİ 3: OBIS DEĞER KONTROLLERİ (obis_value)
# =============================================================================
#
# OBIS değerlerinin sayısal/mantıksal kontrolü.
# Değer, OBIS satırından otomatik olarak parse edilir.
#
# Desteklenen check tipleri:
#   range         - Sayısal aralık (min, max)
#   equals        - Tam eşitlik (value)
#   not_equals    - Eşit olmamalı (value)
#   not_empty     - Boş olmamalı
#   bit_zero      - Belirtilen bit 0 olmalı (bit)
#   bit_one       - Belirtilen bit 1 olmalı (bit)
#   regex_match   - Değer regex'e uymalı (pattern)
#
# Özel alanlar:
#   obis_code     Kontrol edilecek OBIS kodu
#   min           Alt sınır (range için)
#   max           Üst sınır (range için)
#   value         Beklenen değer (equals/not_equals için)
#   bit           Bit numarası, 0'dan başlar (bit_zero/bit_one için)
#   pattern       Regex deseni (regex_match için)
#   unit_strip    true ise birim otomatik soyulur: "224.79*V" -> "224.79"
#                 Varsayılan: true

# --- Kimlik ---

[[rules]]
code = "ID-001"
category = "obis_value"
check = "not_empty"
obis_code = "0.0.0"
severity = "error"
description = "Seri numarası kısa okumada 0.0.0 üzerinden boş - sayaç kimliği okunamıyor"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"
cause = "Sayaç kısa okuma paketinde 0.0.0 OBIS kodunu dönmüyor. (Bağlantı handshake'inden elde edilmiş bir seri numarası olabilir.)"
remedy = "Sayaç firmware versiyonunu kontrol edin; 0.0.0 kodu short read paketinde zorunludur. Firmware güncellemesi veya üretici desteği gerekebilir."

[[rules]]
code = "ID-002"
category = "obis_value"
check = "not_empty"
obis_code = "0.2.0"
severity = "warning"
description = "Program versiyonu boş"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"
cause = "Sayaç firmware versiyon bilgisini (0.2.0) döndürmüyor veya boş döndürüyor."
remedy = "Sayaç firmware'inin versiyon bilgisi programlanmış olmalıdır. Üretici ile iletişime geçin."

# --- Elektriksel Parametreler ---

[[rules]]
code = "EL-001"
category = "obis_value"
check = "range"
obis_code = "32.7.0"
min = 90.0
max = 265.0
severity = "error"
description = "L1 (R faz) gerilimi çalışma aralığı dışında (90-265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "Şebeke gerilimi normal sınırlar dışında."
remedy = "Dağıtım şirketi ile iletişime geçin. Trafo çıkış gerilimini kontrol edin."

[[rules]]
code = "EL-002"
category = "obis_value"
check = "range"
obis_code = "52.7.0"
min = 90.0
max = 265.0
profile = ["three_phase_direct", "three_phase_ct"]
severity = "error"
description = "L2 (S faz) gerilimi çalışma aralığı dışında (90-265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "S fazı şebeke gerilimi normal çalışma sınırları dışında."
remedy = "Dağıtım şirketi ile iletişime geçin. Trafo çıkış gerilimini ve faz bağlantılarını kontrol edin."

[[rules]]
code = "EL-003"
category = "obis_value"
check = "range"
obis_code = "72.7.0"
min = 90.0
max = 265.0
profile = ["three_phase_direct", "three_phase_ct"]
severity = "error"
description = "L3 (T faz) gerilimi çalışma aralığı dışında (90-265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"
cause = "T fazı şebeke gerilimi normal çalışma sınırları dışında."
remedy = "Dağıtım şirketi ile iletişime geçin. Trafo çıkış gerilimini ve faz bağlantılarını kontrol edin."

[[rules]]
code = "EL-004"
category = "obis_value"
check = "range"
obis_code = "14.7.0"
min = 49.0
max = 51.0
severity = "warning"
description = "Şebeke frekansı 50 Hz +/-%2 aralığında değil (49-51 Hz)"
spec_ref = "TEDAŞ Şartname 1.4 Çizelge 2 / MASS Şartname 1.4"
cause = "Şebeke frekansı nominal 50 Hz değerinden sapma gösteriyor."
remedy = "Geçici bir şebeke dalgalanması olabilir. Sorun devam ederse dağıtım şirketi ile iletişime geçin."

# --- Yapılandırma ---

[[rules]]
code = "DEM-001"
category = "obis_value"
check = "equals"
obis_code = "0.8.0"
value = "15"
severity = "warning"
description = "Demant ölçüm periyodu 15 dakika olmalı"
spec_ref = "TEDAŞ Şartname 4.3 madde 91 / MASS Şartname 4.3 madde 80"
cause = "Sayaçtaki demant (maksimum güç) ölçüm entegrasyon periyodu 15 dakika olarak ayarlanmamış."
remedy = "Sayaç programlama modunda 0.8.0 OBIS kodunu 15 dakika olarak ayarlayın."

[[rules]]
code = "DEM-002"
category = "obis_value"
check = "range"
obis_code = "0.8.4"
# TEDAŞ Madde 104: "Yük profili 15-30-60 dakikalık aralıklarla kaydedilecektir.
# Modüler sayaçlarda teknik kalite kayıtları talep edilmesi durumunda 1 dakika da olabilir."
# Bu nedenle equals="15" yerine range 1-60 dk kullanıldı.
# MASS Madde 91: Aynı şekilde 15-30-60 dk. Varsayılan 15 dk.
min = 1
max = 60
severity = "warning"
description = "Yük profili kayıt periyodu 1-60 dakika aralığında olmalı (nominal 15 dk)"
spec_ref = "TEDAŞ Şartname 4.5 madde 104 / MASS Şartname 4.5 madde 91"
cause = "Sayaçtaki yük profili kayıt aralığı (0.8.4) geçerli sınırlar dışında ayarlanmış."
remedy = "Normal kurulum için 15 dakika ayarlayın. Modüler sayaçlarda teknik kalite talebi varsa 1 dk da geçerlidir."

# --- FF Hata/Durum Kodu (F.F.0) ---
# Her bit ayrı kural olarak tanımlanır.
# bit_zero: ilgili bit 1 ise uyumsuzluk üretir (0 olmalı).

# Donanım Hataları (Bit 0-4)
[[rules]]
code = "FF-001"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 0
severity = "error"
description = "RTC (Saat Modülü) Arızası"
spec_ref = "TEDAŞ Şartname Ek-F / MASS Şartname Ek-C"
cause = "Gerçek zamanlı saat (RTC) modülü çalışmıyor veya arızalı."
remedy = "Sayacı servise gönderin. RTC modülü veya pili değiştirilmelidir."

[[rules]]
code = "FF-002"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 1
severity = "error"
description = "Ölçüm Entegresi Arızası"
spec_ref = "TEDAŞ Şartname Ek-F / MASS Şartname Ek-C"
cause = "Ölçüm entegre devresi (metering IC) arızalı veya yanıt vermiyor."
remedy = "Sayacı servise gönderin. Ölçüm donanımı değiştirilmelidir."

[[rules]]
code = "FF-003"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 2
severity = "error"
description = "Kritik Ölçüm Hatası"
spec_ref = "TEDAŞ Şartname Ek-F / MASS Şartname Ek-C"
cause = "Sayaçta kritik bir ölçüm hatası tespit edildi. Ölçüm sonuçları güvenilir olmayabilir."
