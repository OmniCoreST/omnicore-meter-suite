# compliance_rules.toml
# =====================
# TEDAŞ MLZ/2017-062.B ve MASS Protokol Uyumluluk Kuralları
# Versiyon: 2.0.0
#
# Bu dosyayı düzenleyerek uyumluluk kurallarını güncelleyebilirsiniz.
# Programlama bilgisi gerekmez — mevcut bir [[rules]] bloğunu kopyalayıp değiştirin.
#
# Desteklenen kural tipleri (check değerleri):
#   range              → Sayısal aralık (min, max)
#   equals             → Eşitlik (value)
#   not_equals         → Eşit olmamalı (value)
#   not_empty          → Boş olmamalı
#   bit_zero           → ff_code/gf_code'da bit 0 olmalı (bit)
#   bit_one            → Bit 1 olmalı (bit)
#   tariff_balance     → T1+T2+T3+T4 = toplam (tolerance, kWh)
#   time_drift_minutes → Sayaç/sistem saat farkı (max_drift, dakika)
#
# phases: 1 veya 3 — yalnızca o faz sayısındaki sayaçlara uygulanır.
#         Belirtilmezse tüm sayaçlarda çalışır.
#
# severity: "error" | "warning" | "info"
# update_url: GitHub raw URL — boş bırakılırsa otomatik güncelleme devre dışı

rules_version = "2.0.0"
update_url = ""

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# KİMLİK KURALLARI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "ID-001"
field = "serial_number"
check = "not_empty"
severity = "error"
description = "Seri numarası boş — sayaç kimliği okunamıyor"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"

[[rules]]
code = "ID-002"
field = "production_date"
check = "not_empty"
severity = "warning"
description = "Üretim tarihi boş"
spec_ref = "TEDAŞ Şartname 3.1 / MASS Şartname 3.1"

[[rules]]
code = "ID-003"
field = "calibration_date"
check = "not_empty"
severity = "warning"
description = "Kalibrasyon tarihi boş"
spec_ref = "TEDAŞ Şartname 2.1.11 madde 47 / MASS Şartname 2.1.11"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ELEKTRİKSEL PARAMETRELER
# TEDAS Şartname 2.2.2 Çizelge 4, MASS Şartname 2.2.2 — Calisma gerilimi: 90–265 V
# TEDAS Şartname 1.4 Çizelge 2, MASS Şartname 1.4 — Frekans: 50 Hz ±%2
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "EL-001"
field = "voltage_l1"
check = "range"
min = 90.0
max = 265.0
severity = "error"
description = "L1 (R faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"

[[rules]]
code = "EL-002"
field = "voltage_l2"
check = "range"
min = 90.0
max = 265.0
phases = 3
severity = "error"
description = "L2 (S faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"

[[rules]]
code = "EL-003"
field = "voltage_l3"
check = "range"
min = 90.0
max = 265.0
phases = 3
severity = "error"
description = "L3 (T faz) gerilimi çalışma aralığı dışında (90–265 V)"
spec_ref = "TEDAŞ Şartname 2.2.2 Çizelge 4 / MASS Şartname 2.2.2"

[[rules]]
code = "EL-004"
field = "frequency"
check = "range"
min = 49.0
max = 51.0
severity = "warning"
description = "Şebeke frekansı tolerans dışında — beklenen: 50 Hz ±%2 (49–51 Hz)"
spec_ref = "TEDAŞ Şartname 1.4 Çizelge 2 / MASS Şartname 1.4"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PIL VE ROLE DURUMU
# TEDAS Şartname 4.11, MASS Şartname 4.11
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "BAT-001"
field = "battery_status"
check = "not_equals"
value = "low"
severity = "warning"
description = "Pil seviyesi düşük — sayaç belleğini kaybedebilir"
spec_ref = "TEDAŞ Şartname 4.11 / MASS Şartname 4.11"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEMANT PERIYODU
# TEDAS Şartname 4.3 madde 91, MASS Şartname 4.3 madde 80 — Standart: 15 dakika
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "DEM-001"
field = "demand_period"
check = "equals"
value = "15"
severity = "warning"
description = "Talep ölçüm periyodu 15 dakika olmalı (TEDAŞ standart değeri)"
spec_ref = "TEDAŞ Şartname 4.3 madde 91 / MASS Şartname 4.3 madde 80"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TARiFE DENGESi
# TEDAS Şartname 4.2, MASS Şartname 4.2 — T0 = T1+T2+T3+T4
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "TRF-001"
field = "tariff_sum"
check = "tariff_balance"
tolerance = 0.01
severity = "warning"
description = "T1+T2+T3+T4 toplamı genel toplama eşit değil (tolerans: 0,01 kWh)"
spec_ref = "TEDAŞ Şartname 4.2 / MASS Şartname 4.2"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SAAT SAPMASI
# TEDAS Şartname 2.1.11 madde 47, MASS Şartname 2.1.11 — Maks sapma: 0.5 sn/gun (TS EN 62054-21)
# 5 dakikalik uygulama esigi kullanilmistir
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[rules]]
code = "TIME-001"
field = "time_drift"
check = "time_drift_minutes"
max_drift = 5
severity = "warning"
description = "Sayaç saati sistem saatinden 5 dakikadan fazla sapıyor — zaman senkronizasyonu önerilir"
spec_ref = "TEDAŞ Şartname 2.1.11 madde 47 / TS EN 62054-21"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# FF HATA / DURUM KODU (F.F.0)
# TEDAS Şartname 5.3 ve Ek-F, MASS Şartname 5.3 ve Ek-C
# Her bit icin ayri bir kural — bit_zero: ilgili bit 1 olmamali
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Donanim Hatalari (Bit 0–4) ──────────────────────────────────────────────

[[rules]]
code = "FF-001"
field = "ff_code"
check = "bit_zero"
bit = 0
severity = "error"
description = "Gerçek zamanlı saat modülü (RTC) arızası (FF Bit 0)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-002"
field = "ff_code"
check = "bit_zero"
bit = 1
severity = "error"
description = "Ölçüm entegresi arızası — enerji ölçümü güvenilir değil (FF Bit 1)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-003"
field = "ff_code"
check = "bit_zero"
bit = 2
severity = "error"
description = "Kritik ölçüm hatası tespit edildi (FF Bit 2)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-004"
field = "ff_code"
check = "bit_zero"
bit = 3
severity = "warning"
description = "RS-485 iletişim portu hatası (FF Bit 3)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-005"
field = "ff_code"
check = "bit_zero"
bit = 4
severity = "error"
description = "Sayaç kalibre edilmemiş (FF Bit 4)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Fiziksel Mudahale (Bit 5–7) ─────────────────────────────────────────────

[[rules]]
code = "FF-006"
field = "ff_code"
check = "bit_zero"
bit = 5
severity = "warning"
description = "Klemens kapağı açık veya açılma geçmişi mevcut (FF Bit 5)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-007"
field = "ff_code"
check = "bit_zero"
bit = 6
severity = "warning"
description = "Üst kapak açık veya açılma geçmişi mevcut (FF Bit 6)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-008"
field = "ff_code"
check = "bit_zero"
bit = 7
severity = "info"
description = "Geçmişte üst kapak açılmış (FF Bit 7)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Akım Var / Gerilim Yok (Bit 8–10) ──────────────────────────────────────

[[rules]]
code = "FF-009"
field = "ff_code"
check = "bit_zero"
bit = 8
severity = "error"
description = "R fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 8)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-010"
field = "ff_code"
check = "bit_zero"
bit = 9
phases = 3
severity = "error"
description = "S fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 9)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-011"
field = "ff_code"
check = "bit_zero"
bit = 10
phases = 3
severity = "error"
description = "T fazında akım var, gerilim yok — kaçak veya müdahale şüphesi (FF Bit 10)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Manyetik Alan (Bit 11–13) ───────────────────────────────────────────────
# TEDAS Şartname 4.10 madde 141, MASS Şartname 4.10 madde 128 — Esik: >400 mT

[[rules]]
code = "FF-012"
field = "ff_code"
check = "bit_zero"
bit = 11
severity = "error"
description = "R fazında manyetik alan müdahalesi tespit edildi (>400 mT) (FF Bit 11)"
spec_ref = "TEDAŞ Şartname 4.10 madde 141 / MASS Şartname 4.10 madde 128"

[[rules]]
code = "FF-013"
field = "ff_code"
check = "bit_zero"
bit = 12
phases = 3
severity = "error"
description = "S fazında manyetik alan müdahalesi tespit edildi (>400 mT) (FF Bit 12)"
spec_ref = "TEDAŞ Şartname 4.10 madde 141 / MASS Şartname 4.10 madde 128"

[[rules]]
code = "FF-014"
field = "ff_code"
check = "bit_zero"
bit = 13
phases = 3
severity = "error"
description = "T fazında manyetik alan müdahalesi tespit edildi (>400 mT) (FF Bit 13)"
spec_ref = "TEDAŞ Şartname 4.10 madde 141 / MASS Şartname 4.10 madde 128"

# ── Endeks Durgunlugu (Bit 14–16) ───────────────────────────────────────────

[[rules]]
code = "FF-015"
field = "ff_code"
check = "bit_zero"
bit = 14
severity = "warning"
description = "Akım >20 mA iken T1 endeksi durağan — kayıt hatası şüphesi (FF Bit 14)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-016"
field = "ff_code"
check = "bit_zero"
bit = 15
severity = "warning"
description = "Akım >20 mA iken T2 endeksi durağan — kayıt hatası şüphesi (FF Bit 15)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-017"
field = "ff_code"
check = "bit_zero"
bit = 16
severity = "warning"
description = "Akım >20 mA iken T3 endeksi durağan — kayıt hatası şüphesi (FF Bit 16)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Faz Endeks Ilerleyisi Sifir (Bit 17–19) ─────────────────────────────────

[[rules]]
code = "FF-018"
field = "ff_code"
check = "bit_zero"
bit = 17
severity = "warning"
description = "R faz enerji endeksi iki aydır ilerlemiyor (FF Bit 17)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-019"
field = "ff_code"
check = "bit_zero"
bit = 18
phases = 3
severity = "warning"
description = "S faz enerji endeksi iki aydır ilerlemiyor (FF Bit 18)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-020"
field = "ff_code"
check = "bit_zero"
bit = 19
phases = 3
severity = "warning"
description = "T faz enerji endeksi iki aydır ilerlemiyor (FF Bit 19)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Faz Kesilmesi (Bit 20–23) ───────────────────────────────────────────────

[[rules]]
code = "FF-021"
field = "ff_code"
check = "bit_zero"
bit = 20
severity = "warning"
description = "R faz kesintisi alarmı devam ediyor (FF Bit 20)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-022"
field = "ff_code"
check = "bit_zero"
bit = 21
phases = 3
severity = "warning"
description = "S faz kesintisi alarmı devam ediyor (FF Bit 21)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-023"
field = "ff_code"
check = "bit_zero"
bit = 22
phases = 3
severity = "warning"
description = "T faz kesintisi alarmı devam ediyor (FF Bit 22)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-024"
field = "ff_code"
check = "bit_zero"
bit = 23
severity = "warning"
description = "3 faz birden kesintisi alarmı devam ediyor (FF Bit 23)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Sonlanmamis Uyarilar (Bit 24–25) ────────────────────────────────────────

[[rules]]
code = "FF-025"
field = "ff_code"
check = "bit_zero"
bit = 24
severity = "warning"
description = "Akım hatası uyarısı hâlâ aktif, sonlanmamış (FF Bit 24)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-026"
field = "ff_code"
check = "bit_zero"
bit = 25
severity = "warning"
description = "Gerilim hatası uyarısı hâlâ aktif, sonlanmamış (FF Bit 25)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Endeks Gerilemesi (Bit 26–28) ───────────────────────────────────────────

[[rules]]
code = "FF-027"
field = "ff_code"
check = "bit_zero"
bit = 26
severity = "error"
description = "R faz aktif enerji endeksi geriledi — enerji hırsızlığı şüphesi (FF Bit 26)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-028"
field = "ff_code"
check = "bit_zero"
bit = 27
phases = 3
severity = "error"
description = "S faz aktif enerji endeksi geriledi — enerji hırsızlığı şüphesi (FF Bit 27)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-029"
field = "ff_code"
check = "bit_zero"
bit = 28
phases = 3
severity = "error"
description = "T faz aktif enerji endeksi geriledi — enerji hırsızlığı şüphesi (FF Bit 28)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

# ── Demant Anomalisi (Bit 29–31) ────────────────────────────────────────────

[[rules]]
code = "FF-030"
field = "ff_code"
check = "bit_zero"
bit = 29
severity = "warning"
description = "Aktif güç varken maksimum talep endeksi ilerlemiyor (FF Bit 29)"
spec_ref = "TEDAŞ Şartname 5.3 Ek-F / MASS Şartname 5.3 Ek-C"

[[rules]]
code = "FF-031"
field = "ff_code"
check = "bit_zero"
bit = 30
severity = "warning"
description = "T0 ile T1+T2+T3+T4 toplamı arasındaki fark 200 W'ı aşıyor (FF Bit 30)"
