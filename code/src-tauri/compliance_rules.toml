# =============================================================================
# KATEGORİ A: OBIS VARLIK — KISA OKUMA EKSİKLERİ (obis_existence, short_read)
# =============================================================================
# Aşağıdaki OBIS kodları TEDAŞ şartnamesine göre kısa okumada (Mode 6)
# zorunlu olup OBIS-001 kuralına henüz eklenmemiş olanlardır.

[[rules]]
code = "OBIS-004"
category = "obis_existence"
check = "must_exist"
session_type = "short_read"
obis_codes = [
    "96.92.0",    # Model kodu — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "0.2.0",      # Yazılım versiyonu — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "0.2.1",      # Yazılım kontrol numarası (CRC) — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "0.9.5",      # Haftanın günü — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "1.8.4",      # Aktif enerji T4 — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "2.8.0",      # İhraç aktif enerji toplam — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "1.6.0",      # Maks. aktif güç demant — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "2.6.0",      # İhraç maks. aktif güç — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "5.8.0",      # Reaktif endüktif enerji (+) — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "6.8.0",      # Reaktif kapasitif enerji (+) — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "7.8.0",      # Reaktif endüktif enerji (-) — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "8.8.0",      # Reaktif kapasitif enerji (-) — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "91.7.0",     # Nötr Irms — TEDAŞ Ek-C: Kısa Okuma Paketi (6); sadece nötr ölçümlü sayaçlarda (Madde 6.7)
    "33.7.0",     # Cos φ L1 — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "97.1.0",     # Yük profili 1 içerik tanımı — TEDAŞ Ek-C: Kısa Okuma Paketi (6)
    "97.2.0",     # Yük profili 2 içerik tanımı — TEDAŞ Ek-C: Kısa Okuma Paketi (6); sadece reaktif/kombi sayaçlarda
    # NOT: F.A.0 (Anlık Bildirim Aktivasyonu) TEDAŞ Ek-C'de kısa okuma paketi
    # annotasyonu olmadan yer alıyor — kısa okuma paketine zorunlu dahil değil,
    # sadece RS-485 anlık bildirim için geçerli (Madde 5.3 / Ek-L). Buradan kaldırıldı.
    # "F.A.0",
]
severity = "error"
description = "Kısa okumada zorunlu OBIS kodları eksik (genişletilmiş liste)"
# TEDAŞ Ek-C: Kısa Okuma Paketi (6) sütununda listelenen tüm zorunlu kodlar.
# 91.7.0 yalnızca nötr ölçüm özellikli sayaçlarda (opsiyonel, Madde 6.7).
# 97.2.0 yalnızca reaktif/kombi sayaçlarda zorunlu.
spec_ref = "TEDAŞ Şartname Ek-C Kısa Okuma Paketi (6) / MASS Şartname Ek-C"
cause = "Sayaç firmware'i kısa okuma paketinde TEDAŞ Ek-C'nin gerektirdiği tüm OBIS kodlarını döndürmüyor."
remedy = "Sayaç firmware güncellemesi gerekebilir. Üretici ile iletişime geçin."
enabled = true

[[rules]]
code = "OBIS-005"
category = "obis_existence"
check = "must_exist"
session_type = "short_read"
profile = ["three_phase_direct", "three_phase_ct"]
obis_codes = [
    "52.7.0",    # L2 Vrms
    "72.7.0",    # L3 Vrms
    "51.7.0",    # L2 Irms
    "71.7.0",    # L3 Irms
    "53.7.0",    # Cos φ L2
    "73.7.0",    # Cos φ L3
]
severity = "error"
description = "Üç fazlı sayaçlarda L2/L3 OBIS kodları kısa okumada zorunlu"
spec_ref = "TEDAŞ Şartname Ek-C Kısa Okuma Paketi (6) / MASS Şartname Ek-C"
cause = "Üç fazlı sayaç olarak seçilmiş ancak L2/L3 faz verileri kısa okumada bulunmuyor."
remedy = "Sayaç profil seçimini kontrol edin. Firmware güncellemesi gerekebilir."
enabled = true


