# =============================================================================
# KATEGORİ 4: ÇAPRAZ DEĞER KONTROLLERİ (cross_value)
# =============================================================================
#
# Birden fazla OBIS değerini karşılaştıran kontroller.
#
# Desteklenen check tipleri:
#   tariff_balance      - T1+T2+T3+T4 = toplam (tolerance)
#   time_drift_minutes  - Sayaç saati vs sistem saati (max_drift)
#   value_compare       - İki OBIS değerini karşılaştır (op: gt, lt, eq, gte, lte)
#
# Özel alanlar:
#   obis_total       Toplam değerin OBIS kodu (tariff_balance)
#   obis_parts       Parçaların OBIS kodları (tariff_balance)
#   tolerance        İzin verilen sapma (tariff_balance)
#   obis_date        Tarih OBIS kodu (time_drift_minutes)
#   obis_time        Saat OBIS kodu (time_drift_minutes)
#   max_drift        Maks sapma dakika (time_drift_minutes)
#   obis_left        Sol değer OBIS kodu (value_compare)
#   obis_right       Sağ değer OBIS kodu (value_compare)
#   op               Karşılaştırma operatörü (value_compare)

[[rules]]
code = "TRF-001"
category = "cross_value"
check = "tariff_balance"
obis_total = "1.8.0"
obis_parts = ["1.8.1", "1.8.2", "1.8.3", "1.8.4"]
tolerance = 0.01
severity = "info"
description = "Tarife toplamı 0.01 kWh toleransla uyumsuz"
spec_ref = "TEDAŞ Şartname 4.2 / MASS Şartname 4.2"
cause = "Aktif enerji toplam endeksi (1.8.0) ile tarife dilimlerinin toplamı (T1+T2+T3+T4) arasında fark var."
remedy = "Küçük farklar yuvarlama kaynaklı olabilir. Büyük farklar tarife programlama hatasını gösterir."

[[rules]]
code = "TRF-002"
category = "cross_value"
check = "tariff_balance"
obis_total = "2.8.0"
obis_parts = ["2.8.1", "2.8.2", "2.8.3", "2.8.4"]
tolerance = 0.01
severity = "info"
description = "İhraç tarife toplamı 0.01 kWh toleransla uyumsuz"
spec_ref = "TEDAŞ Şartname 4.2 / MASS Şartname 4.2"
cause = "İhraç enerji toplam endeksi (2.8.0) ile tarife dilimlerinin toplamı arasında fark var."
remedy = "Küçük farklar yuvarlama kaynaklı olabilir. Büyük farklar tarife programlama hatasını gösterir."

[[rules]]
code = "TIME-001"
category = "cross_value"
check = "time_drift_minutes"
obis_date = "0.9.2"
obis_time = "0.9.1"
max_drift = 5
severity = "error"
description = "Sayaç saati 5 dakikadan fazla sapıyor"
spec_ref = "TEDAŞ Şartname 2.1.11 madde 47 / MASS Şartname 2.1.11"
cause = "Sayaç dahili saati sistem saatiyle senkronize değil. RTC kayması veya pil zayıflığı olabilir."
remedy = "Zaman senkronizasyonu yapın (Saat Ayarları sayfasından). RTC pil durumunu kontrol edin."


# =============================================================================
# KATEGORİ 5: PROTOKOL KONTROLLERİ (protocol)
# =============================================================================
#
# IEC 62056-21 protokol davranışını kontrol eder.
# Bu kurallar iletişim loglarından otomatik değerlendirilir.
#
# Desteklenen check tipleri:
#   handshake_complete       - El sıkışma tamamı başarılı olmalı
#   identification_format    - Kimlik yanıtı /XXX formatında olmalı
#   baud_negotiation         - Baud değişimi başarılı olmalı
#   bcc_valid                - BCC (Block Check) geçerli olmalı
#   response_time            - Yanıt süresi sınır içinde olmalı (max_ms)
#   etx_present              - Veri bloğu ETX ile bitmeli
#   mode_supported           - Belirtilen modlar desteklenmeli (modes)

[[rules]]
code = "PROTO-001"
category = "protocol"
check = "handshake_complete"
severity = "error"
description = "IEC 62056-21 el sıkışma protokolü başarılı olmalı"
spec_ref = "IEC 62056-21 6.3"
cause = "Sayaç ile optik port üzerinden IEC 62056-21 el sıkışması tamamlanamadı."
remedy = "Optik okuma kafasının doğru konumlandığından emin olun. Baud hızı ve parite ayarlarını kontrol edin (7E1, 300 baud başlangıç)."

[[rules]]
code = "PROTO-002"
category = "protocol"
check = "identification_format"
pattern = '^/[A-Z]{3}\d'
severity = "error"
description = "Kimlik yanıtı /XXXb... formatında olmalı (X=harf, b=baud karakteri)"
spec_ref = "IEC 62056-21 6.3.2"
cause = "Sayacın kimlik yanıtı IEC 62056-21 standardına uygun formatta değil."
remedy = "Sayaç firmware'inin IEC 62056-21 uyumlu olduğundan emin olun. Üretici ile iletişime geçin."

[[rules]]
code = "PROTO-003"
category = "protocol"
check = "baud_negotiation"
severity = "error"
description = "Baud rate değişimi başarılı olmalı"
spec_ref = "IEC 62056-21 6.3.3"
cause = "Başlangıç baud hızından (300) hedef baud hızına geçiş başarısız oldu."
remedy = "Optik okuma kafası kalitesini kontrol edin. Daha düşük bir baud hızı ile denemeyi düşünün."

[[rules]]
code = "PROTO-004"
category = "protocol"
check = "bcc_valid"
severity = "error"
description = "Veri bloğu BCC (Block Check Character) kontrolü geçerli olmalı"
spec_ref = "IEC 62056-21 6.3.2"
cause = "Alınan veri bloğunun BCC (checksum) değeri hesaplanan değerle eşleşmiyor. Veri bozulması olabilir."
remedy = "Optik okuma kafası bağlantısını kontrol edin. Gürültülü ortamlarda baud hızını düşürmeyi deneyin."

[[rules]]
code = "PROTO-005"
category = "protocol"
check = "response_time"
max_ms = 1500
severity = "warning"
description = "Sayaç kimlik yanıtı 1.5 saniye içinde gelmeli"
spec_ref = "IEC 62056-21 6.3.2"
cause = "Sayaç kimlik isteğine 1.5 saniye içinde yanıt vermedi."
remedy = "Optik okuma kafasının doğru konumlandığından emin olun. Sayacın optik portu aktif olmalıdır."

[[rules]]
code = "PROTO-006"
category = "protocol"
check = "etx_present"
severity = "error"
description = "Veri bloğu ETX (0x03) ile sonlanmalı"
spec_ref = "IEC 62056-21 6.3"
cause = "Veri bloğu beklenen ETX (End of Text) karakteri ile sonlanmamış. İletişim kesilmiş olabilir."
remedy = "İletişimi tekrar deneyin. Optik okuma kafasının sabit durduğundan emin olun."

[[rules]]
code = "PROTO-007"
category = "protocol"
check = "mode_supported"
modes = ["0", "6"]
severity = "error"
description = "Sayaç Mode 0 (tam okuma) ve Mode 6 (kısa okuma) desteklemeli"
spec_ref = "TEDAŞ Şartname 3.2 / IEC 62056-21"
cause = "Sayaç TEDAŞ şartnamesinin zorunlu kıldığı Mode 0 ve/veya Mode 6 okuma modlarını desteklemiyor."
remedy = "Sayaç firmware'inin TEDAŞ uyumlu olduğundan emin olun. Üretici ile iletişime geçin."

[[rules]]
code = "PROTO-008"
category = "protocol"
check = "mode_supported"
modes = ["1"]
severity = "warning"
description = "Sayaç Mode 1 (programlama modu) desteklemeli"
spec_ref = "TEDAŞ Şartname 3.2 / IEC 62056-21"
cause = "Sayaç Mode 1 (programlama modu) desteklemiyor. Uzaktan parametre değişikliği yapılamayabilir."
remedy = "Sayaç üreticisine başvurun. Mode 1 desteği saha programlaması için gereklidir."


# =============================================================================
# KATEGORİ 6: OTURUM KONTROLLERİ (session)
# =============================================================================
#
# Her okuma/yazma oturumunun başarıyla tamamlanıp tamamlanmadığını kontrol eder.
#
# Desteklenen check tipleri:
#   must_succeed   - Belirtilen oturum tipi başarılı olmalı
#   data_received  - Oturumda en az N satır veri alınmalı (min_lines)

[[rules]]
code = "SESS-001"
category = "session"
check = "must_succeed"
session_type = "short_read"
severity = "error"
description = "Kısa okuma (Mode 6) başarılı tamamlanmalı"
spec_ref = "TEDAŞ Şartname 3.2"
cause = "Kısa okuma (Mode 6) oturumu başarısız oldu. İletişim hatası veya sayaç yanıt vermemiş olabilir."
remedy = "Optik okuma kafasını kontrol edip tekrar deneyin. Sayacın Mode 6 desteklediğinden emin olun."

[[rules]]
code = "SESS-002"
category = "session"
check = "must_succeed"
session_type = "full_read"
severity = "error"
description = "Tam okuma (Mode 0) başarılı tamamlanmalı"
spec_ref = "TEDAŞ Şartname 3.2"
cause = "Tam okuma (Mode 0) oturumu başarısız oldu. İletişim zaman aşımı veya veri bozulması olabilir."
remedy = "Optik okuma kafasını kontrol edip tekrar deneyin. Tam okuma süresi uzun olabilir, zaman aşımı ayarını artırın."

[[rules]]
code = "SESS-003"
category = "session"
check = "must_succeed"
session_type = "load_profile"
severity = "error"
description = "Yük profili okuması başarılı tamamlanmalı"
spec_ref = "TEDAŞ Şartname 4.5 / MASS Şartname 4.5"
cause = "Yük profili okuma oturumu başarısız oldu. Şifre gereksinimi veya iletişim hatası olabilir."
remedy = "Sayaç şifre istiyorsa P1 şifresini girin. Bağlantıyı kontrol edip tekrar deneyin."

[[rules]]
code = "SESS-004"
category = "session"
check = "data_received"
session_type = "full_read"
min_lines = 100
severity = "warning"
description = "Tam okumada en az 100 satır OBIS verisi bekleniyor"
spec_ref = "TEDAŞ Şartname Ek-A"
cause = "Tam okumada beklenen minimum veri miktarına ulaşılamamış. İletişim erken kesilmiş olabilir."
remedy = "Okumayı tekrar deneyin. Optik bağlantı kalitesini kontrol edin."

[[rules]]
code = "SESS-005"
category = "session"
check = "data_received"
session_type = "short_read"
min_lines = 10
severity = "warning"
description = "Kısa okumada en az 10 satır OBIS verisi bekleniyor"
spec_ref = "TEDAŞ Şartname 3.2"
cause = "Kısa okumada beklenen minimum veri miktarına ulaşılamamış."
remedy = "Okumayı tekrar deneyin. Sayaç firmware'inin kısa okuma paketini doğru oluşturduğundan emin olun."


# =============================================================================
# KATEGORİ 7: YÜK PROFİLİ KONTROLLERİ (load_profile)
# =============================================================================
#
# Yük profili verisinin yapısal ve içerik kontrolü.
#
# Desteklenen check tipleri:
#   period_equals     - Kayıt periyodu beklenen değerde olmalı (expected_minutes)
#   channels_exist    - Kanal tanım OBIS kodları mevcut olmalı (obis_codes)
#   min_entries       - En az N adet yük profili kaydı olmalı (min_count)
#   continuity        - Ardışık boş periyot sayısı sınır içinde (max_gap)

[[rules]]
code = "LP-001"
category = "load_profile"
check = "period_equals"
obis_code = "0.8.0"
expected_minutes = 15
severity = "error"
description = "Yük profili kayıt periyodu 15 dakika olmalı"
spec_ref = "TEDAŞ Şartname 4.5 madde 104 / MASS Şartname 4.5 madde 91"
cause = "Yük profili kayıt aralığı (0.8.0) 15 dakika olarak ayarlanmamış."
remedy = "Sayaç programlama modunda yük profili periyodunu (0.8.0) 15 dakika olarak ayarlayın."

[[rules]]
code = "LP-002"
category = "load_profile"
check = "channels_exist"
obis_codes = ["97.1.0", "97.2.0"]
severity = "error"
description = "Yük profili kanal tanımları (97.1.0, 97.2.0) mevcut olmalı"
spec_ref = "TEDAŞ Şartname 4.3"
cause = "Yük profili kanal tanım OBIS kodları (97.1.0, 97.2.0) sayaçtan okunamadı."
remedy = "Sayaç firmware'inin yük profili kanal tanımlarını döndürdüğünden emin olun. Üretici ile iletişime geçin."

[[rules]]
code = "LP-003"
category = "load_profile"
check = "continuity"
max_gap = 4
severity = "warning"
description = "Yük profilinde ardışık 4'ten fazla boş periyot olmamalı"
spec_ref = "TEDAŞ Şartname 4.3"
cause = "Yük profilinde ardışık 4'ten fazla boş (eksik) kayıt periyodu tespit edildi. Uzun süreli kesinti veya veri kaybı olabilir."
remedy = "Kesinti kayıtlarını kontrol edin. Uzun süreli elektrik kesintisi bu duruma neden olabilir."


# =============================================================================
# KATEGORİ 8: TAM OKUMA YAPI KONTROLLERİ (full_read)
# =============================================================================
#
# Tam okumada beklenen veri yapısı kontrolleri.
#
# Desteklenen check tipleri:
#   history_series    - Aylık geçmiş serisi mevcut olmalı
#                       obis_pattern: "1.8.0*{n}" şeklinde, n yerine 1..count
#                       min_count: en az kaç ay mevcut olmalı
#   outage_log        - Kesinti kayıtları
#   billing_periods   - Fatura dönemleri

[[rules]]
code = "FULL-001"
category = "full_read"
check = "history_series"
obis_pattern = "1.8.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylık aktif enerji geçmişi tam okumada mevcut olmalı"
spec_ref = "TEDAŞ Şartname 4.2"
cause = "Tam okumada son 12 aylık aktif enerji endeks geçmişi bulunamadı. Sayaç yeni takılmış olabilir."
remedy = "Sayaç 12 aydan kısa süredir çalışıyorsa normaldir. Aksi halde firmware'i kontrol edin."

[[rules]]
code = "FULL-002"
category = "full_read"
check = "history_series"
obis_pattern = "2.8.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylık ihraç enerji geçmişi mevcut olmalı"
spec_ref = "TEDAŞ Şartname 4.2"
cause = "Tam okumada son 12 aylık ihraç (reaktif) enerji endeks geçmişi bulunamadı."
remedy = "Sayaç 12 aydan kısa süredir çalışıyorsa normaldir. Aksi halde firmware'i kontrol edin."

[[rules]]
code = "FULL-003"
category = "full_read"
check = "history_series"
obis_pattern = "1.6.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylık maks. demant geçmişi mevcut olmalı"
