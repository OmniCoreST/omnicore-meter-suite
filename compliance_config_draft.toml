# =============================================================================
# OmniCore Meter Suite - Compliance Configuration v3.0.0
# =============================================================================
#
# Bu dosya sayac uyumluluk denetiminin tum ayarlarini icerir:
#   - Sayac profilleri (tek faz, uc faz, akim trafolu vb.)
#   - Denetim test plani (hangi okuma modlari calistirilacak)
#   - Uyumluluk kurallari (OBIS varlik, format, deger, protokol vb.)
#
# Dosya formati: TOML (https://toml.io)
# Kodlama: UTF-8
#
# Kural kategorileri:
#   obis_existence    - Zorunlu OBIS kodlarinin varligi
#   obis_format       - OBIS degerlerinin format kontrolu
#   obis_value        - OBIS degerlerinin sayisal/mantiksal kontrolu
#   cross_value       - Birden fazla OBIS degeri arasi kontrol
#   protocol          - IEC 62056-21 protokol uyumlulugu
#   session           - Okuma/yazma oturumlarinin basarisi
#   load_profile      - Yuk profili yapisal kontrolleri
#   full_read         - Tam okuma veri yapisi kontrolleri
#
# =============================================================================

config_version = "3.0.0"
update_url = ""

# =============================================================================
# SAYAC PROFILLERI
# =============================================================================
#
# Her profil bir sayac tipini tanimlar. Kurallar "profile" alani ile
# hangi profillere uygulanacagini belirler.
#
# Bir kural "profile" belirtmezse TUM profillerde calisir.
# Bir kural profile = ["three_phase_direct", "three_phase_ct"] derse
# sadece o profillerde calisir.

[[profiles]]
id = "single_phase"
name = "Tek Fazli Sayac"
phases = 1
connection = "direct"           # direct | ct
description = "Tek fazli direkt baglanti sayaci (monofaze)"

[[profiles]]
id = "three_phase_direct"
name = "Uc Fazli Direkt Baglanti"
phases = 3
connection = "direct"
description = "Uc fazli direkt baglanti sayaci (trifaze)"

[[profiles]]
id = "three_phase_ct"
name = "Uc Fazli Akim Trafolu"
phases = 3
connection = "ct"
description = "Uc fazli akim trafosu baglantili sayac"


# =============================================================================
# TEST PLANI
# =============================================================================
#
# Uyumluluk denetimi sirasinda hangi islemlerin yapilacagini belirler.
# Her test_plan bir sayac profili grubuna uygulanabilir.
# enabled = false yaparak bir adimi devre disi birakabilirsiniz.
#
# Desteklenen adimlar:
#   short_read    - Kisa okuma (Mode 6)
#   full_read     - Tam okuma (Mode 0)
#   load_profile  - Yuk profili okuma (Mode 1 + P.01)
#   time_check    - Saat karsilastirma (0.9.1 / 0.9.2 okuma)
#   obis_read     - Belirli OBIS kodlarini tekil okuma (Mode 1 + R1)
#
# Adimlar yukaridan asagiya sirayla calistirilir.
# Bir adim basarisiz olursa sonraki adimlar yine calisir (bagimsiz).

[test_plan]
name = "TEDAS Tam Uyumluluk Testi"
description = "TEDAS sartnamesi kapsaminda tum okuma modlarini test eder"

[[test_plan.steps]]
id = "short_read"
name = "Kisa Okuma (Mode 6)"
mode = "short_read"
enabled = true
timeout_seconds = 30
retry_count = 1

[[test_plan.steps]]
id = "full_read"
name = "Tam Okuma (Mode 0)"
mode = "full_read"
enabled = true
timeout_seconds = 120
retry_count = 1

[[test_plan.steps]]
id = "load_profile"
name = "Yuk Profili Okuma"
mode = "load_profile"
enabled = true
timeout_seconds = 180
retry_count = 1

[[test_plan.steps]]
id = "time_check"
name = "Saat Kontrolu"
mode = "obis_read"
obis_codes = ["0.9.1", "0.9.2"]
enabled = true
timeout_seconds = 30
retry_count = 1


# =============================================================================
# KURALLAR
# =============================================================================
#
# --- Ortak alanlar (tum kural kategorileri icin) ---
#
#   code          Benzersiz kural kodu (orn. "OBIS-001")
#   category      Kural kategorisi (asagidaki listeden)
#   check         Kontrol tipi (kategoriye gore degisir)
#   severity      "error" | "warning" | "info"
#   description   Uyumsuzluk aciklamasi
#   spec_ref      Sartname referansi (istege bagli)
#   cause         Sorunun olasi nedeni (istege bagli)
#   remedy        Onerilen duzeltme (istege bagli)
#   profile       Hangi profillerde calisir (istege bagli, belirtilmezse hepsinde)
#   session_type  Hangi okuma tipinde calisir (istege bagli):
#                   "short_read" | "full_read" | "load_profile" | "any"
#                 Belirtilmezse "any" kabul edilir.
#   enabled       true | false (varsayilan: true)
#


# =============================================================================
# KATEGORI 1: OBIS VARLIK KONTROLLERI (obis_existence)
# =============================================================================
#
# Sayacin belirli OBIS kodlarini dondurup dondurmedigi kontrol edilir.
# Kisa okumada bazi OBIS kodlari gelmeyebilir, bu yuzden session_type onemli.
#
# Ozel alanlar:
#   obis_codes    Kontrol edilecek OBIS kod listesi (hepsi mevcut olmali)

[[rules]]
code = "OBIS-001"
category = "obis_existence"
check = "must_exist"
session_type = "short_read"
obis_codes = [
    "0.0.0",                               # Seri numarasi
    "0.9.1", "0.9.2",                      # Saat ve tarih
    "32.7.0", "31.7.0",                    # Anlik gerilim ve akim (L1)
    "14.7.0",                              # Frekans
    "1.8.0", "1.8.1", "1.8.2", "1.8.3",   # Aktif enerji (T0-T3)
    "F.F.0",                               # FF hata kodu
]
severity = "error"
description = "Kisa okumada zorunlu OBIS kodlari eksik"
spec_ref = "TEDAS Sartname 3.2 / MASS Sartname 3.2"

[[rules]]
code = "OBIS-002"
category = "obis_existence"
check = "must_exist"
session_type = "full_read"
obis_codes = [
    # Kimlik
    "0.0.0", "0.9.1", "0.9.2", "0.2.0", "0.2.1",
    "96.1.3",
    # Anlik olcumler
    "32.7.0", "31.7.0", "91.7.0", "33.7.0", "14.7.0",
    "15.7.0", "131.7.0",
    # Enerji endeksleri
    "1.8.0", "1.8.1", "1.8.2", "1.8.3", "1.8.4",
    "2.8.0", "2.8.1", "2.8.2", "2.8.3", "2.8.4",
    "5.8.0", "6.8.0", "7.8.0", "8.8.0",
    # Demant
    "1.6.0", "2.6.0",
    # Durum kodlari
    "F.F.0", "F.F.1", "F.A.0",
    # Yapilandirma
    "0.8.0", "96.3.10", "96.3.12", "96.3.13",
    # Yuk profili kanal tanimlari
    "97.1.0", "97.2.0",
    # Kesinti kayitlari (en az ilk giris)
    "96.2.2",
]
severity = "error"
description = "Tam okumada zorunlu OBIS kodlari eksik"
spec_ref = "TEDAS Sartname Ek-A / MASS Sartname Ek-A"

[[rules]]
code = "OBIS-003"
category = "obis_existence"
check = "must_exist"
session_type = "full_read"
profile = ["three_phase_direct", "three_phase_ct"]
obis_codes = [
    "52.7.0", "72.7.0",                   # L2, L3 gerilim
    "51.7.0", "71.7.0",                    # L2, L3 akim
    "53.7.0", "73.7.0",                    # L2, L3 guc faktoru
]
severity = "error"
description = "Uc fazli sayaclarda L2/L3 OBIS kodlari zorunlu"
spec_ref = "TEDAS Sartname Ek-A"


# =============================================================================
# KATEGORI 2: OBIS FORMAT KONTROLLERI (obis_format)
# =============================================================================
#
# OBIS degerlerinin beklenen formatta olup olmadigini kontrol eder.
# Regex deseni kullanilir.
#
# Ozel alanlar:
#   obis_code     Kontrol edilecek tek OBIS kodu
#   pattern       Beklenen regex deseni (deger kismina uygulanir)

[[rules]]
code = "FMT-001"
category = "obis_format"
check = "value_format"
obis_code = "1.8.0"
pattern = '^\d{6}\.\d{3}\*kWh$'
severity = "warning"
description = "Aktif enerji degeri XXXXXX.XXX*kWh formatinda olmali"
spec_ref = "TEDAS Sartname 4.2"

[[rules]]
code = "FMT-002"
category = "obis_format"
check = "value_format"
obis_code = "F.F.0"
pattern = '^[01]{64}$'
severity = "error"
description = "FF hata kodu 64 bitlik binary string olmali"
spec_ref = "TEDAS Sartname 5.3"

[[rules]]
code = "FMT-003"
category = "obis_format"
check = "value_format"
obis_code = "0.9.2"
pattern = '^\d{2}-\d{2}-\d{2}$'
severity = "warning"
description = "Tarih YY-MM-DD formatinda olmali"

[[rules]]
code = "FMT-004"
category = "obis_format"
check = "value_format"
obis_code = "0.9.1"
pattern = '^\d{2}:\d{2}:\d{2}$'
severity = "warning"
description = "Saat HH:MM:SS formatinda olmali"

[[rules]]
code = "FMT-005"
category = "obis_format"
check = "value_format"
obis_code = "32.7.0"
pattern = '^\d+\.\d+\*V$'
severity = "warning"
description = "Gerilim degeri XXX.XX*V formatinda olmali"

[[rules]]
code = "FMT-006"
category = "obis_format"
check = "value_format"
obis_code = "31.7.0"
pattern = '^\d+\.\d+\*A$'
severity = "warning"
description = "Akim degeri XXX.XXX*A formatinda olmali"

[[rules]]
code = "FMT-007"
category = "obis_format"
check = "value_format"
obis_code = "14.7.0"
pattern = '^\d+\.\d+\*Hz$'
severity = "warning"
description = "Frekans degeri XX.X*Hz formatinda olmali"

[[rules]]
code = "FMT-008"
category = "obis_format"
check = "value_format"
obis_code = "1.6.0"
pattern = '^\d{3}\.\d{3}\*kW$'
severity = "warning"
description = "Maksimum demant degeri XXX.XXX*kW formatinda olmali"


# =============================================================================
# KATEGORI 3: OBIS DEGER KONTROLLERI (obis_value)
# =============================================================================
#
# OBIS degerlerinin sayisal/mantiksal kontrolu.
# Deger, OBIS satirindan otomatik olarak parse edilir.
#
# Desteklenen check tipleri:
#   range         - Sayisal aralik (min, max)
#   equals        - Tam esitlik (value)
#   not_equals    - Esit olmamali (value)
#   not_empty     - Bos olmamali
#   bit_zero      - Belirtilen bit 0 olmali (bit)
#   bit_one       - Belirtilen bit 1 olmali (bit)
#   regex_match   - Deger regex'e uymali (pattern)
#
# Ozel alanlar:
#   obis_code     Kontrol edilecek OBIS kodu
#   min           Alt sinir (range icin)
#   max           Ust sinir (range icin)
#   value         Beklenen deger (equals/not_equals icin)
#   bit           Bit numarasi, 0'dan baslar (bit_zero/bit_one icin)
#   pattern       Regex deseni (regex_match icin)
#   unit_strip    true ise birim otomatik soyulur: "224.79*V" -> "224.79"
#                 Varsayilan: true

# --- Kimlik ---

[[rules]]
code = "ID-001"
category = "obis_value"
check = "not_empty"
obis_code = "0.0.0"
severity = "error"
description = "Seri numarasi bos - sayac kimligi okunamiyor"
spec_ref = "TEDAS Sartname 3.1 / MASS Sartname 3.1"
cause = "Sayac hafizasinda seri numarasi kaydi bulunmuyor veya 0.0.0 OBIS kodu yanit vermiyor."
remedy = "Sayaci servise gonderin. Fabrika ayarlarinda seri numarasi programlanmalidir."

[[rules]]
code = "ID-002"
category = "obis_value"
check = "not_empty"
obis_code = "0.2.0"
severity = "warning"
description = "Program versiyonu bos"
spec_ref = "TEDAS Sartname 3.1 / MASS Sartname 3.1"

# --- Elektriksel Parametreler ---

[[rules]]
code = "EL-001"
category = "obis_value"
check = "range"
obis_code = "32.7.0"
min = 90.0
max = 265.0
severity = "error"
description = "L1 (R faz) gerilimi calisma araligi disinda (90-265 V)"
spec_ref = "TEDAS Sartname 2.2.2 Cizelge 4 / MASS Sartname 2.2.2"
cause = "Sebeke gerilimi normal sinirlar disinda."
remedy = "Dagitim sirketi ile iletisime gecin. Trafo cikis gerilimini kontrol edin."

[[rules]]
code = "EL-002"
category = "obis_value"
check = "range"
obis_code = "52.7.0"
min = 90.0
max = 265.0
profile = ["three_phase_direct", "three_phase_ct"]
severity = "error"
description = "L2 (S faz) gerilimi calisma araligi disinda (90-265 V)"
spec_ref = "TEDAS Sartname 2.2.2 Cizelge 4 / MASS Sartname 2.2.2"

[[rules]]
code = "EL-003"
category = "obis_value"
check = "range"
obis_code = "72.7.0"
min = 90.0
max = 265.0
profile = ["three_phase_direct", "three_phase_ct"]
severity = "error"
description = "L3 (T faz) gerilimi calisma araligi disinda (90-265 V)"
spec_ref = "TEDAS Sartname 2.2.2 Cizelge 4 / MASS Sartname 2.2.2"

[[rules]]
code = "EL-004"
category = "obis_value"
check = "range"
obis_code = "14.7.0"
min = 49.0
max = 51.0
severity = "warning"
description = "Sebeke frekansi 50 Hz +/-%2 araliginda degil (49-51 Hz)"
spec_ref = "TEDAS Sartname 1.4 Cizelge 2 / MASS Sartname 1.4"

# --- Yapilandirma ---

[[rules]]
code = "DEM-001"
category = "obis_value"
check = "equals"
obis_code = "0.8.0"
value = "15"
severity = "warning"
description = "Demant olcum periyodu 15 dakika olmali"
spec_ref = "TEDAS Sartname 4.3 madde 91 / MASS Sartname 4.3 madde 80"

[[rules]]
code = "DEM-002"
category = "obis_value"
check = "equals"
obis_code = "0.8.4"
value = "15"
severity = "warning"
description = "Yuk profili kayit periyodu 15 dakika olmali"
spec_ref = "TEDAS Sartname 4.3"

# --- FF Hata/Durum Kodu (F.F.0) ---
# Her bit ayri kural olarak tanimlanir.
# bit_zero: ilgili bit 1 ise uyumsuzluk uretir (0 olmali).

# Donanim Hatalari (Bit 0-4)
[[rules]]
code = "FF-001"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 0
severity = "error"
description = "RTC (Saat Modulu) Arizasi"
spec_ref = "TEDAS Ek-F, MASS Ek-C"
cause = "Gercek zamanli saat calismiyor."
remedy = "Sayaci servise gonderin."

[[rules]]
code = "FF-002"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 1
severity = "error"
description = "Olcum Entegresi Arizasi"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
code = "FF-003"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 2
severity = "error"
description = "Kritik Olcum Hatasi"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
code = "FF-004"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 3
severity = "warning"
description = "RS-485 Port Hatasi"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
code = "FF-005"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 4
severity = "error"
description = "Kalibrasyon Yapilmamis"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

# Fiziksel Mudahale (Bit 5-7)
[[rules]]
code = "FF-006"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 5
severity = "warning"
description = "Klemens Kapagi Acik"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
code = "FF-007"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 6
severity = "warning"
description = "Ust Kapak Acik"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
code = "FF-008"
category = "obis_value"
check = "bit_zero"
