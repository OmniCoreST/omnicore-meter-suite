bit = 7
severity = "info"
description = "Ust Kapak Acilma Bilgisi Mevcut"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

# Akim Var / Gerilim Yok (Bit 8-10)
[[rules]]
code = "FF-009"
category = "obis_value"
check = "bit_zero"
obis_code = "F.F.0"
bit = 8
severity = "error"
description = "R Fazi - Akim Var, Gerilim Yok"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
