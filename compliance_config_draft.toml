# =============================================================================
# KATEGORI 4: CAPRAZ DEGER KONTROLLERI (cross_value)
# =============================================================================
#
# Birden fazla OBIS degerini karsilastiran kontroller.
#
# Desteklenen check tipleri:
#   tariff_balance      - T1+T2+T3+T4 = toplam (tolerance)
#   time_drift_minutes  - Sayac saati vs sistem saati (max_drift)
#   value_compare       - Iki OBIS degerini karsilastir (op: gt, lt, eq, gte, lte)
#
# Ozel alanlar:
#   obis_total       Toplam degerin OBIS kodu (tariff_balance)
#   obis_parts       Parcalarin OBIS kodlari (tariff_balance)
#   tolerance        Izin verilen sapma (tariff_balance)
#   obis_date        Tarih OBIS kodu (time_drift_minutes)
#   obis_time        Saat OBIS kodu (time_drift_minutes)
#   max_drift        Maks sapma dakika (time_drift_minutes)
#   obis_left        Sol deger OBIS kodu (value_compare)
#   obis_right       Sag deger OBIS kodu (value_compare)
#   op               Karsilastirma operatoru (value_compare)

[[rules]]
code = "TRF-001"
category = "cross_value"
check = "tariff_balance"
obis_total = "1.8.0"
obis_parts = ["1.8.1", "1.8.2", "1.8.3", "1.8.4"]
tolerance = 0.01
severity = "info"
description = "Tarife toplami 0.01 kWh toleransla uyumsuz"
spec_ref = "TEDAS Sartname 4.2 / MASS Sartname 4.2"

[[rules]]
code = "TRF-002"
category = "cross_value"
check = "tariff_balance"
obis_total = "2.8.0"
obis_parts = ["2.8.1", "2.8.2", "2.8.3", "2.8.4"]
tolerance = 0.01
severity = "info"
description = "Ihrac tarife toplami 0.01 kWh toleransla uyumsuz"
spec_ref = "TEDAS Sartname 4.2 / MASS Sartname 4.2"

[[rules]]
code = "TIME-001"
category = "cross_value"
check = "time_drift_minutes"
obis_date = "0.9.2"
obis_time = "0.9.1"
max_drift = 5
severity = "error"
description = "Sayac saati 5 dakikadan fazla sapiyor"
spec_ref = "TEDAS Sartname 2.1.11 madde 47 / MASS Sartname 2.1.11"
cause = "Sayac dahili saati sistem saatiyle senkronize degil."
remedy = "Zaman senkronizasyonu yapin (Saat Ayarlari sayfasindan)."


# =============================================================================
# KATEGORI 5: PROTOKOL KONTROLLERI (protocol)
# =============================================================================
#
# IEC 62056-21 protokol davranisini kontrol eder.
# Bu kurallar iletisim loglarindan otomatik degerlendirilir.
#
# Desteklenen check tipleri:
#   handshake_complete       - El sikisma tamami basarili olmali
#   identification_format    - Kimlik yaniti /XXX formatinda olmali
#   baud_negotiation         - Baud degisimi basarili olmali
#   bcc_valid                - BCC (Block Check) gecerli olmali
#   response_time            - Yanit suresi sinir icinde olmali (max_ms)
#   etx_present              - Veri blogu ETX ile bitmeli
#   mode_supported           - Belirtilen modlar desteklenmeli (modes)

[[rules]]
code = "PROTO-001"
category = "protocol"
check = "handshake_complete"
severity = "error"
description = "IEC 62056-21 el sikisma protokolu basarili olmali"
spec_ref = "IEC 62056-21 6.3"

[[rules]]
code = "PROTO-002"
category = "protocol"
check = "identification_format"
pattern = '^/[A-Z]{3}\d'
severity = "error"
description = "Kimlik yaniti /XXXb... formatinda olmali (X=harf, b=baud karakteri)"
spec_ref = "IEC 62056-21 6.3.2"

[[rules]]
code = "PROTO-003"
category = "protocol"
check = "baud_negotiation"
severity = "error"
description = "Baud rate degisimi basarili olmali"
spec_ref = "IEC 62056-21 6.3.3"

[[rules]]
code = "PROTO-004"
category = "protocol"
check = "bcc_valid"
severity = "error"
description = "Veri blogu BCC (Block Check Character) kontrolu gecerli olmali"
spec_ref = "IEC 62056-21 6.3.2"

[[rules]]
code = "PROTO-005"
category = "protocol"
check = "response_time"
max_ms = 1500
severity = "warning"
description = "Sayac kimlik yaniti 1.5 saniye icinde gelmeli"
spec_ref = "IEC 62056-21 6.3.2"

[[rules]]
code = "PROTO-006"
category = "protocol"
check = "etx_present"
severity = "error"
description = "Veri blogu ETX (0x03) ile sonlanmali"
spec_ref = "IEC 62056-21 6.3"

[[rules]]
code = "PROTO-007"
category = "protocol"
check = "mode_supported"
modes = ["0", "6"]
severity = "error"
description = "Sayac Mode 0 (tam okuma) ve Mode 6 (kisa okuma) desteklemeli"
spec_ref = "TEDAS Sartname 3.2 / IEC 62056-21"

[[rules]]
code = "PROTO-008"
category = "protocol"
check = "mode_supported"
modes = ["1"]
severity = "warning"
description = "Sayac Mode 1 (programlama modu) desteklemeli"
spec_ref = "TEDAS Sartname 3.2 / IEC 62056-21"


# =============================================================================
# KATEGORI 6: OTURUM KONTROLLERI (session)
# =============================================================================
#
# Her okuma/yazma oturumunun basariyla tamamlanip tamamlanmadigini kontrol eder.
#
# Desteklenen check tipleri:
#   must_succeed   - Belirtilen oturum tipi basarili olmali
#   data_received  - Oturumda en az N satir veri alinmali (min_lines)

[[rules]]
code = "SESS-001"
category = "session"
check = "must_succeed"
session_type = "short_read"
severity = "error"
description = "Kisa okuma (Mode 6) basarili tamamlanmali"
spec_ref = "TEDAS Sartname 3.2"

[[rules]]
code = "SESS-002"
category = "session"
check = "must_succeed"
session_type = "full_read"
severity = "error"
description = "Tam okuma (Mode 0) basarili tamamlanmali"
spec_ref = "TEDAS Sartname 3.2"

[[rules]]
code = "SESS-003"
category = "session"
check = "must_succeed"
session_type = "load_profile"
severity = "error"
description = "Yuk profili okumasi basarili tamamlanmali"
spec_ref = "TEDAS Sartname 4.3"

[[rules]]
code = "SESS-004"
category = "session"
check = "data_received"
session_type = "full_read"
min_lines = 100
severity = "warning"
description = "Tam okumada en az 100 satir OBIS verisi bekleniyor"
spec_ref = "TEDAS Sartname Ek-A"

[[rules]]
code = "SESS-005"
category = "session"
check = "data_received"
session_type = "short_read"
min_lines = 10
severity = "warning"
description = "Kisa okumada en az 10 satir OBIS verisi bekleniyor"


# =============================================================================
# KATEGORI 7: YUK PROFILI KONTROLLERI (load_profile)
# =============================================================================
#
# Yuk profili verisinin yapisal ve icerik kontrolu.
#
# Desteklenen check tipleri:
#   period_equals     - Kayit periyodu beklenen degerde olmali (expected_minutes)
#   channels_exist    - Kanal tanim OBIS kodlari mevcut olmali (obis_codes)
#   min_entries       - En az N adet yuk profili kaydi olmali (min_count)
#   continuity        - Ardisik bos periyot sayisi sinir icinde (max_gap)

[[rules]]
code = "LP-001"
category = "load_profile"
check = "period_equals"
obis_code = "0.8.0"
expected_minutes = 15
severity = "error"
description = "Yuk profili kayit periyodu 15 dakika olmali"
spec_ref = "TEDAS Sartname 4.3"

[[rules]]
code = "LP-002"
category = "load_profile"
check = "channels_exist"
obis_codes = ["97.1.0", "97.2.0"]
severity = "error"
description = "Yuk profili kanal tanimlari (97.1.0, 97.2.0) mevcut olmali"
spec_ref = "TEDAS Sartname 4.3"

[[rules]]
code = "LP-003"
category = "load_profile"
check = "continuity"
max_gap = 4
severity = "warning"
description = "Yuk profilinde ardisik 4'ten fazla bos periyot olmamali"


# =============================================================================
# KATEGORI 8: TAM OKUMA YAPI KONTROLLERI (full_read)
# =============================================================================
#
# Tam okumada beklenen veri yapisi kontrolleri.
#
# Desteklenen check tipleri:
#   history_series    - Aylik gecmis serisi mevcut olmali
#                       obis_pattern: "1.8.0*{n}" seklinde, n yerine 1..count
#                       min_count: en az kac ay mevcut olmali
#   outage_log        - Kesinti kayitlari
#   billing_periods   - Fatura donemleri

[[rules]]
code = "FULL-001"
category = "full_read"
check = "history_series"
obis_pattern = "1.8.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylik aktif enerji gecmisi tam okumada mevcut olmali"
spec_ref = "TEDAS Sartname 4.2"

[[rules]]
code = "FULL-002"
category = "full_read"
check = "history_series"
obis_pattern = "2.8.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylik ihrac enerji gecmisi mevcut olmali"
spec_ref = "TEDAS Sartname 4.2"

[[rules]]
code = "FULL-003"
category = "full_read"
check = "history_series"
obis_pattern = "1.6.0*{n}"
min_count = 12
severity = "warning"
description = "Son 12 aylik maks. demant gecmisi mevcut olmali"
spec_ref = "TEDAS Sartname 4.3"

[[rules]]
code = "FULL-004"
category = "full_read"
check = "history_series"
obis_pattern = "96.2.2*{n}"
min_count = 10
severity = "warning"
description = "En az 10 adet kesinti kaydi (96.2.2*1..10) mevcut olmali"
spec_ref = "TEDAS Sartname 4.8"

[[rules]]
code = "FULL-005"
category = "full_read"
check = "history_series"
obis_pattern = "0.1.2*{n}"
min_count = 12
severity = "info"
description = "Son 12 aylik fatura donemi kayitlari mevcut olmali"
