check = "bit_zero"
obis_code = "F.F.0"
bit = 17
severity = "warning"
description = "R Faz Endeksi Iki Aydir Ilerlemedi"
spec_ref = "TEDAS Ek-F, MASS Ek-C"

[[rules]]
